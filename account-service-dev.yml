server:
  port: ${ACCOUNT_SERVICE_PORT:8083}

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/microfinancehub}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:axelle3928}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  data:
    rabbitmq:
      host: ${RABBITMQ_HOST:localhost}
      port: ${RABBITMQ_PORT:5672}
      username: ${RABBITMQ_USERNAME:guest}
      password: ${RABBITMQ_PASSWORD:guest}
      virtual-host: /


eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}


# Configuration JWT (partagée avec tous les services)
jwt:
  secret: ${JWT_SECRET:dev-secret-key-for-local-development-only-minimum-32-chars}
  expiration: 86400000    # 24h en millisecondes


# Actuator (monitoring & health check)
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always


# Logging
logging:
  level:
    com.microfinancehub: DEBUG
    org.springframework.security: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
