# Identité du service
server.port=8083

# Liaison avec le service d'enregistrement
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# Connexion DB avec variables de substitution
spring.datasource.url=jdbc:postgresql://localhost:5432/microfinance_db

spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:axelle3928}

# Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.data.redis.host=localhost
spring.data.redis.port=6379

# RabbitMQ
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Noms pour tes échanges et files d'attente
app.rabbitmq.exchange=finance.exchange
app.rabbitmq.routingkey=balance.updated